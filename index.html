
<!DOCTYPE html>
<html>
<head>
<title>South Bet</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#06121a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:90%;
max-width:380px;
background:#0b1820;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.logo{
text-align:center;
font-size:40px;
font-weight:bold;
color:#ff6d7a;
margin-bottom:25px;
}

.row{
display:flex;
gap:10px;
}

select,input{
width:100%;
padding:15px;
border:none;
border-radius:8px;
background:#eaeaea;
font-size:16px;
box-sizing:border-box;
margin-bottom:15px;
}

label{
display:block;
margin-bottom:8px;
font-size:18px;
}

.link{
color:white;
text-decoration:underline;
margin-bottom:15px;
display:inline-block;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
margin-bottom:15px;
cursor:pointer;
}

.login{
background:#315361;
color:white;
}

.demo{
background:#315361;
color:white;
}

.apk{
background:#64c363;
color:white;
}

.signup{
text-align:center;
margin-bottom:15px;
}

.signup span{
font-weight:bold;
}

#msg{
font-size:18px;
text-align:center;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
SOUTH BET
</div>

<div class="row">
<div>
<label>Login with</label>
<select>
<option>User ID</option>
</select>
</div>

<div>
<label>User ID</label>
<input id="user" placeholder="Enter username">
</div>
</div>

<label>Password</label>
<input id="pass" type="password" placeholder="Enter Password">

<a class="link">Forgot Password/Username</a>

<button class="login" onclick="login()">Login</button>

<button class="demo">Demo Login</button>

<div class="signup">
New User? <span>Create an Account</span>
</div>

<button class="apk">
📱 Download .apk
</button>

<div id="msg"></div>

</div>

<script>

function login(){

let u=user.value;
let p=pass.value;

if(u==="kiran5601" && p==="Lucky@5601"){
msg.innerHTML="⛔ User blocked";
}
else{
msg.innerHTML="❌ User does not exist";
}

}

</script>

</body>
</html>
